name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.0.1"
        required: false
        type: string
      publish_marketplace:
        description: "Publish to Visual Studio Marketplace when VSCE_PAT is available"
        required: false
        type: boolean
        default: true
      publish_open_vsx:
        description: "Publish to Open VSX when OVSX_PAT is available"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

jobs:
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 30
    steps:
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.4.0
        with:
          ref: ${{ github.ref_name }}
          check-name: "Lint, Test, and Package"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20

  package:
    name: Build Release VSIX
    runs-on: ubuntu-latest
    needs: [wait-for-ci]
    if: always() && (github.event_name == 'workflow_dispatch' || needs.wait-for-ci.result == 'success' || needs.wait-for-ci.result == 'skipped')
    outputs:
      package_version: ${{ steps.package-meta.outputs.package_version }}
      tag_name: ${{ steps.package-meta.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: npm run package:vsix

      - name: Verify VSIX contents
        run: npm run verify:vsix-contents

      - name: Read package metadata
        id: package-meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${VERSION}"
          fi
          echo "package_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-vscode-vsix
          path: dist/reasonix-vscode.vsix
          if-no-files-found: error

  publish-marketplace:
    name: Publish to Visual Studio Marketplace
    runs-on: ubuntu-latest
    needs: [package]
    if: >
      always() &&
      needs.package.result == 'success' &&
      (github.event_name == 'push' || github.event.inputs.publish_marketplace == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: reasonix-vscode-vsix
          path: dist

      - name: Check Marketplace token
        id: marketplace-token
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          if [ -n "$VSCE_PAT" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "VSCE_PAT is not configured; skipping Visual Studio Marketplace publish."
          fi

      - name: Publish VSIX
        if: steps.marketplace-token.outputs.present == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath dist/reasonix-vscode.vsix

  publish-open-vsx:
    name: Publish to Open VSX
    runs-on: ubuntu-latest
    needs: [package]
    if: >
      always() &&
      needs.package.result == 'success' &&
      (github.event_name == 'push' || github.event.inputs.publish_open_vsx == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: reasonix-vscode-vsix
          path: dist

      - name: Check Open VSX token
        id: open-vsx-token
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          if [ -n "$OVSX_PAT" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "OVSX_PAT is not configured; skipping Open VSX publish."
          fi

      - name: Publish VSIX
        if: steps.open-vsx-token.outputs.present == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish dist/reasonix-vscode.vsix --pat "$OVSX_PAT"

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [package, publish-marketplace, publish-open-vsx]
    if: always() && needs.package.result == 'success'

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: reasonix-vscode-vsix
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.package.outputs.tag_name }}
          name: Reasonix ${{ needs.package.outputs.tag_name }}
          files: dist/reasonix-vscode.vsix
          generate_release_notes: true
